<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gestión de Empleados{% endblock %}</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --accent: #14b8a6;
            --danger: #dc2626;
            --warning: #f59e0b;
            --success: #16a34a;
            --surface: #ffffff;
            --surface-soft: #f8fafc;
            --text: #0f172a;
            --muted: #64748b;
            --border: #e2e8f0;
            --shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #eef4ff 0%, #f8fafc 100%);
            color: var(--text);
        }
        nav {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
            padding: 16px 28px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.18);
        }
        nav a {
            color: #e2e8f0;
            text-decoration: none;
            font-size: 14px;
            padding: 8px 12px;
            border-radius: 999px;
            transition: background 0.2s ease, color 0.2s ease;
        }
        nav a:hover {
            background: rgba(255,255,255,0.12);
            color: #ffffff;
        }
        nav .marca {
            font-weight: 700;
            font-size: 16px;
            margin-right: 16px;
            color: #ffffff;
            letter-spacing: 0.2px;
        }
        .contenedor {
            max-width: 1100px;
            margin: 28px auto 40px;
            background: var(--surface);
            padding: 28px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(226, 232, 240, 0.9);
        }
        h1, h2, h3 { margin-top: 0; color: var(--text); }
        .eyebrow {
            display: inline-block;
            margin: 0 0 8px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            color: var(--primary);
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        .page-subtitle { color: var(--muted); margin: 6px 0 0; }
        .hero {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 20px;
            margin-bottom: 24px;
            align-items: stretch;
        }
        .hero-card, .panel, .info-card, .form-card {
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.04);
        }
        .hero-actions, .form-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
            margin-top: 18px;
        }
        .info-card { text-decoration: none; color: inherit; display: block; transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .info-card:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(15, 23, 42, 0.08); }
        .info-card ul { padding-left: 18px; color: var(--muted); margin: 8px 0 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px 10px; border-bottom: 1px solid var(--border); text-align: left; vertical-align: middle; }
        th { background: #f8fafc; color: #334155; font-size: 13px; text-transform: uppercase; letter-spacing: 0.04em; }
        tr:hover { background: #f8fbff; }
        .acciones a { margin-right: 10px; font-size: 13px; color: var(--primary); text-decoration: none; font-weight: 600; }
        .acciones a:hover { color: var(--primary-dark); text-decoration: underline; }
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: #fff;
            padding: 10px 16px;
            border: none;
            border-radius: 999px;
            text-decoration: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 8px 16px rgba(37, 99, 235, 0.2);
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 10px 20px rgba(37, 99, 235, 0.24); }
        .btn-eliminar { background: linear-gradient(135deg, #ef4444 0%, var(--danger) 100%); }
        .btn-secundario { background: linear-gradient(135deg, #64748b 0%, #475569 100%); box-shadow: none; }
        .btn-pdf { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); }
        .btn-excel { background: linear-gradient(135deg, var(--success) 0%, #15803d 100%); }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            justify-content: space-between;
            margin: 6px 0 10px;
        }
        .search-form {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            flex: 1;
        }
        .toolbar input[type="text"], .styled-form input, .styled-form select, .styled-form textarea {
            padding: 11px 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            min-width: 240px;
            width: 100%;
            font-size: 14px;
            background: #fff;
            color: var(--text);
        }
        .toolbar input[type="text"]:focus, .styled-form input:focus, .styled-form select:focus, .styled-form textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.16);
        }
        label {
            font-weight: 600;
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #334155;
        }
        .styled-form p { margin: 0 0 14px; }
        .styled-form .helptext { display: block; font-size: 12px; color: var(--muted); margin-top: 6px; }
        .error-summary {
            border: 1px solid #f87171;
            background: #fef2f2;
            color: #b91c1c;
            padding: 14px 16px;
            margin-bottom: 18px;
            border-radius: 12px;
        }
        .error-summary ul { margin: 8px 0 0; padding-left: 18px; }
        .error-summary li { margin-bottom: 6px; }
        .errorlist { color: #b91c1c; margin: 4px 0 12px; font-size: 13px; }
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 12px;
            color: #fff;
            font-weight: 700;
            margin-left: 8px;
        }
        .badge-fbv { background: linear-gradient(135deg, var(--accent) 0%, #0f766e 100%); }
        .badge-cbv { background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%); }
        .vacio {
            color: var(--muted);
            font-style: italic;
            text-align: center;
            padding: 20px 0;
        }
        .empty-state {
            padding: 20px;
            text-align: center;
            color: var(--muted);
            background: var(--surface-soft);
            border-radius: 16px;
            border: 1px dashed var(--border);
        }
        .table-wrap { overflow-x: auto; }
        @media (max-width: 900px) {
            .hero { grid-template-columns: 1fr; }
            .card-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 640px) {
            .contenedor { padding: 18px; margin: 16px; border-radius: 18px; }
            nav { padding: 14px 18px; }
            .page-header { flex-direction: column; }
            .toolbar { align-items: stretch; }
            .toolbar .btn { width: 100%; text-align: center; }
        }
        @media print {
            body { background: #fff; }
            nav, .btn, .toolbar, .acciones { display: none !important; }
            .contenedor { box-shadow: none; border: 1px solid #e2e8f0; margin: 0; border-radius: 0; }
            table { font-size: 10px; }
        }
    </style>
</head>
<body>

<nav>
    <span class="marca">CRUD Empleados &amp; Cargos</span>
    <a href="{% url 'home' %}">Inicio</a>
    <a href="{% url 'fbv_cargo_list' %}">Cargos (VBF)</a>
    <a href="{% url 'fbv_empleado_list' %}">Empleados (VBF)</a>
    <a href="{% url 'cbv_cargo_list' %}">Cargos (VBC)</a>
    <a href="{% url 'cbv_empleado_list' %}">Empleados (VBC)</a>
</nav>

<div class="contenedor">
    {% block content %}{% endblock %}
</div>

</body>
</html>
